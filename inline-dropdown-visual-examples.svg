<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F2E8"/>
      <stop offset="1" stop-color="#EDE6D8"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="1400" height="900" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#6D5A3A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px "Segoe UI", "Noto Sans KR", sans-serif; fill: #2F261B; }
      .subtitle { font: 400 20px "Segoe UI", "Noto Sans KR", sans-serif; fill: #6F6354; }
      .section { font: 700 28px "Segoe UI", "Noto Sans KR", sans-serif; }
      .label { font: 600 16px "Segoe UI", "Noto Sans KR", sans-serif; letter-spacing: 0.08em; }
      .body { font: 500 33px "Georgia", "Times New Roman", serif; fill: #2C241A; }
      .bodySoft { font: 500 33px "Georgia", "Times New Roman", serif; fill: #6E6254; }
      .note { font: 400 18px "Segoe UI", "Noto Sans KR", sans-serif; fill: #6D6256; }
      .dropdown { font: 600 33px "Georgia", "Times New Roman", serif; fill: #1E3D59; }
      .dropdownBad { font: 700 29px "Segoe UI", "Noto Sans KR", sans-serif; fill: #FFFFFF; }
      .smallArrow { font: 700 19px "Segoe UI Symbol", "Noto Sans Symbols", sans-serif; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="84" y="86" class="title">Inline Sentence Dropdown</text>
  <text x="84" y="122" class="subtitle">문장과 자연스럽게 섞이는 좋은 예 / 조작 요소처럼 튀는 나쁜 예</text>

  <g filter="url(#cardShadow)">
    <rect x="68" y="164" width="608" height="664" rx="28" fill="#FFFDF8"/>
    <rect x="724" y="164" width="608" height="664" rx="28" fill="#FFF9F5"/>
  </g>

  <text x="104" y="220" class="section" fill="#285943">Good</text>
  <text x="760" y="220" class="section" fill="#8A3E2F">Bad</text>

  <text x="104" y="258" class="label" fill="#4F7B68">BLENDS WITH THE SENTENCE</text>
  <text x="760" y="258" class="label" fill="#B05A49">LOOKS LIKE A SEPARATE WIDGET</text>

  <g>
    <text x="112" y="338" class="body">나는 </text>
    <text x="197" y="338" class="dropdown">오늘</text>
    <text x="255" y="338" class="smallArrow" fill="#1E3D59">⌄</text>
    <line x1="195" y1="346" x2="268" y2="346" stroke="#9EB8C8" stroke-width="1.5"/>
    <text x="286" y="338" class="body"> </text>
    <text x="298" y="338" class="dropdown">회사에서</text>
    <text x="415" y="338" class="smallArrow" fill="#1E3D59">⌄</text>
    <line x1="296" y1="346" x2="429" y2="346" stroke="#9EB8C8" stroke-width="1.5"/>
    <text x="448" y="338" class="body"> 일해요.</text>
    <text x="112" y="378" class="note">본문과 같은 톤, 작은 화살표, 아주 약한 밑줄</text>
  </g>

  <g>
    <text x="112" y="490" class="body">매일 </text>
    <text x="188" y="490" class="dropdown">오전 9시</text>
    <text x="304" y="490" class="smallArrow" fill="#1E3D59">⌄</text>
    <line x1="186" y1="498" x2="320" y2="498" stroke="#9EB8C8" stroke-width="1.5"/>
    <text x="340" y="490" class="body">에 알림을 보내기</text>
    <text x="112" y="530" class="note">문장을 먼저 읽고, 선택 가능한 부분만 가볍게 인지됨</text>
  </g>

  <g>
    <rect x="112" y="612" width="452" height="112" rx="20" fill="#F4EFE4"/>
    <text x="136" y="675" class="bodySoft">정렬 기준: </text>
    <text x="298" y="675" class="dropdown">최신순</text>
    <text x="380" y="675" class="smallArrow" fill="#1E3D59">⌄</text>
    <text x="112" y="760" class="note">짧은 문장형 설정도 이런 방식이 자연스러워요</text>
  </g>

  <g>
    <rect x="760" y="292" width="148" height="54" rx="10" fill="#D46346"/>
    <text x="783" y="328" class="dropdownBad">오늘 ▼</text>
    <rect x="922" y="292" width="182" height="54" rx="10" fill="#D46346"/>
    <text x="946" y="328" class="dropdownBad">회사에서 ▼</text>
    <text x="760" y="386" class="body">나는          일해요.</text>
    <text x="760" y="426" class="note">버튼처럼 튀어서 문장이 끊겨 보임</text>
  </g>

  <g>
    <text x="760" y="520" class="body">매일 </text>
    <rect x="840" y="480" width="190" height="62" rx="0" fill="#202020"/>
    <text x="866" y="520" class="dropdownBad">오전 9시 ▼</text>
    <text x="1050" y="520" class="body">에 알림</text>
    <text x="760" y="560" class="note">배경 대비가 너무 강하면 본문보다 제어가 먼저 보임</text>
  </g>

  <g>
    <text x="760" y="662" class="body">조건이 </text>
    <rect x="867" y="622" width="110" height="56" rx="28" fill="#F2B84B"/>
    <text x="888" y="659" class="dropdownBad" fill="#382400">AND ▼</text>
    <rect x="989" y="622" width="112" height="56" rx="28" fill="#F2B84B"/>
    <text x="1013" y="659" class="dropdownBad" fill="#382400">3개 ▼</text>
    <rect x="1113" y="622" width="132" height="56" rx="28" fill="#F2B84B"/>
    <text x="1137" y="659" class="dropdownBad" fill="#382400">활성 ▼</text>
    <text x="760" y="718" class="note">토큰 나열처럼 보여서 문장을 읽는 경험이 사라짐</text>
  </g>

  <line x1="700" y1="196" x2="700" y2="796" stroke="#D8CDBB" stroke-width="2" stroke-dasharray="8 10"/>
</svg>
